name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r test-requirements.txt

      - name: Run tests
        run: python -m pytest -v test/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Only publish on pushes to main or tags, never on pull requests.
    if: github.event_name == 'push'
    env:
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        # Take the repo:tag from pipe.yml (strip any placeholder namespace) and
        # prepend the namespace coming from the secret.
        run: |
          NAME_TAG=$(grep '^image:' pipe.yml | sed 's/^image:[[:space:]]*//' | sed 's#.*/##')
          echo "name=${DOCKERHUB_NAMESPACE}/${NAME_TAG}" >> "$GITHUB_OUTPUT"

      - name: Inject namespace into pipe metadata
        run: |
          sed -i "s#^image:.*#image: ${{ steps.image.outputs.name }}#" pipe.yml

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}
